<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Serial Scanner</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="vendor/tesseract/tesseract.min.js"></script>
</head>
<body>
  <div class="snap-stripe"></div>
  <header>
    <h1>Serial Scanner</h1>
    <span id="ver" class="ver"></span>
    <span id="count" class="count">0 captured</span>
    <button id="setup-open" type="button" class="linkbtn">Setup</button>
    <div id="status" class="status">Starting…</div>
  </header>

  <section id="setup" class="setup" hidden>
    <h2>One-time setup</h2>
    <p>Paste the scanner configuration below, then Save. It is stored only on this device.</p>
    <textarea id="setup-config" rows="10" spellcheck="false" placeholder="Paste configuration JSON here"></textarea>
    <div id="setup-error" class="setup-error" role="alert"></div>
    <button id="setup-save" type="button">Save &amp; start</button>
  </section>

  <section class="stage">
    <video id="video" playsinline muted></video>
    <div id="roi" class="roi"></div>
    <button id="torch" type="button" class="torch" hidden aria-label="Torch">&#128737;</button>
    <button id="capture" type="button" aria-label="Capture">Capture</button>
    <canvas id="work" hidden></canvas>
  </section>

  <div class="adjust">
    <label>Scan&nbsp;W <input id="roi-w" type="range" min="40" max="96" step="1" aria-label="Scan area width" /></label>
    <label>Scan&nbsp;H <input id="roi-h" type="range" min="8" max="60" step="1" aria-label="Scan area height" /></label>
  </div>

  <div class="controls">
    <button id="export" type="button">Export CSV</button>
    <button id="clear" type="button">Clear all</button>
  </div>

  <ul id="list" class="list" aria-label="Captured serials"></ul>

  <script type="module" src="js/app.js"></script>
</body>
</html>
